services:
    htcgsc-gorms:
        image: htcgsc-gorms
        build:
            context: .
            dockerfile: ./Dockerfile
        ports:
            - '8080:80'
        environment:
            - DB_CONNECTION=pgsql
            - DB_HOST=db
            - DB_PORT=5432
            - DB_DATABASE=htcgsc_gorms
            - DB_USERNAME=sail
            - DB_PASSWORD=password
        depends_on:
            - db

    db:
        image: postgres:17-alpine
        environment:
            - POSTGRES_DB=htcgsc_gorms
            - POSTGRES_USER=sail
            - POSTGRES_PASSWORD=password
        ports:
            - '5432:5432'
