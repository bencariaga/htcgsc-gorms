services:
    htcgsc-gorms:
        image: htcgsc-gorms
        build:
            context: .
            dockerfile: ./Dockerfile
        ports:
            - '8080:80'
        environment:
            - DB_HOST=db
            - DB_DATABASE=htcgsc_gorms
            - DB_USERNAME=root
            - DB_PASSWORD=secret
        depends_on:
            - db

    db:
        image: mariadb:10.11
        environment:
            - MYSQL_DATABASE=htcgsc_gorms
            - MYSQL_ROOT_PASSWORD=secret
        ports:
            - '3306:3306'
